<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farewell Invite</title>

<!-- Cinzel Font -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #0b0b0b;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Cinzel', serif;
}

/* SINGLE BOX */
.box {
    background-color: #0b0b0b;
    border: 2px solid #d4af37;
    padding: 50px 60px;
    max-width: 650px;
    text-align: center;
    border-radius: 16px;
}

/* GOLD GRADIENT (like title) */
.gold-gradient {
    background: linear-gradient(135deg, #f5d27a, #d4af37, #b8962e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* QUOTE */
.quote {
    font-size: 30px;
    margin-bottom: 30px;
}

/* MESSAGE TEXT */
.text {
    color: #e6e0d4; /* soft light text */
    font-size: 18px;
    line-height: 1.8;
}

/* HIGHLIGHT */
.highlight {
    color: #f5d27a;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
    
    <div class="quote gold-gradient">
        “Endings are celebrations of journeys well lived.”
    </div>

    <div class="text">
        With great respect,<br>
        we invite you to the <span class="highlight">Farewell 2025–26</span>,<br>
        hosted by Grade XI,<br>
        in honor of the graduating Class XII.
    </div>

</div>

</body>
</html>
