<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farewell Invite</title>

<!-- Cinzel Font -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #0b0b0b; /* Matte black */
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Cinzel', serif;
}

.box {
    background-color: #0b0b0b; /* Same matte black */
    border: 2px solid #d4af37; /* Gold */
    padding: 50px 70px;
    max-width: 650px;
    text-align: center;
    border-radius: 12px;
}

.quote {
    color: #d4af37;
    font-size: 26px;
    margin-bottom: 30px;
}

.text {
    color: #d4af37;
    font-size: 18px;
    line-height: 1.8;
}

.highlight {
    font-size: 20px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
    
    <div class="quote">
        “Endings are celebrations of journeys well lived.”
    </div>

    <div class="text">
        With great respect,<br>
        we invite you to the <span class="highlight">Farewell 2025–26</span>,<br>
        hosted by Grade XI,<br>
        in honor of the graduating Class XII.
    </div>

</div>

</body>
</html>
