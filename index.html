<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farewell Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 10px;
    background-color: #0b0b0b;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Cinzel', serif;
    overflow: hidden;
}

/* ⭐ CLEAR STARS */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
        radial-gradient(2px 2px at 10% 20%, white, transparent),
        radial-gradient(2px 2px at 30% 70%, white, transparent),
        radial-gradient(1.5px 1.5px at 50% 40%, white, transparent),
        radial-gradient(2px 2px at 70% 90%, white, transparent),
        radial-gradient(1.5px 1.5px at 90% 10%, white, transparent),
        radial-gradient(2px 2px at 80% 60%, white, transparent),
        radial-gradient(1px 1px at 20% 90%, white, transparent),
        radial-gradient(1.5px 1.5px at 60% 20%, white, transparent);
    background-repeat: repeat;
    animation: twinkle 3s infinite alternate;
    z-index: -1;
}

/* ✨ Twinkle */
@keyframes twinkle {
    from { opacity: 0.4; }
    to { opacity: 1; }
}

/* 📦 BOX (wider now) */
.box {
    border: 2px solid #d4af37;
    padding: 50px 30px;
    width: 95%;          /* almost full width */
    max-width: 500px;    /* keeps it neat */
    text-align: center;
    border-radius: 18px;
    background: transparent; /* so stars show inside */
}

/* GOLD GRADIENT */
.gold-gradient {
    background: linear-gradient(135deg, #f5d27a, #d4af37, #b8962e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* QUOTE */
.quote {
    font-size: 26px;
    margin-bottom: 25px;
}

/* TEXT */
.text {
    color: #e6e0d4;
    font-size: 16px;
    line-height: 1.7;
}

/* HIGHLIGHT */
.highlight {
    color: #f5d27a;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="box">
    
    <div class="quote gold-gradient">
        “Endings are celebrations of journeys well lived.”
    </div>

    <div class="text">
        With great respect,<br>
        we invite you to the <span class="highlight">Farewell 2025–26</span>,<br>
        hosted by Grade XI,<br>
        in honor of the graduating Class XII.
    </div>

</div>

</body>
</html>
