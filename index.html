<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farewell Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #0b0b0b;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-end;   /* pushes card down */
    padding-bottom: 12vh;    /* space from bottom */
    font-family: 'Cinzel', serif;
    overflow: hidden;
}

/* ⭐ Stars background */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
        radial-gradient(2px 2px at 10% 20%, white, transparent),
        radial-gradient(2px 2px at 30% 70%, white, transparent),
        radial-gradient(2px 2px at 50% 40%, white, transparent),
        radial-gradient(2px 2px at 70% 90%, white, transparent),
        radial-gradient(2px 2px at 90% 10%, white, transparent),
        radial-gradient(1.5px 1.5px at 20% 90%, white, transparent),
        radial-gradient(1.5px 1.5px at 60% 20%, white, transparent),
        radial-gradient(1px 1px at 80% 50%, white, transparent);
    animation: twinkle 2.5s infinite alternate;
    z-index: -1;
}

@keyframes twinkle {
    from { opacity: 0.5; }
    to { opacity: 1; }
}

/* 📦 Card */
.box {
    border: 2px solid #d4af37;
    width: 92%;
    max-width: 700px;       /* wider like screenshot */
    padding: 80px 30px;
    text-align: center;
    border-radius: 26px;
    box-shadow: 0 0 30px rgba(212, 175, 55, 0.12); /* soft glow */
}

/* ✨ Gold text */
.gold-gradient {
    background: linear-gradient(135deg, #f5d27a, #d4af37, #b8962e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* 📝 Quote */
.quote {
    font-size: 26px;
    margin-bottom: 30px;
}

/* 📄 Text */
.text {
    color: #d8d2c4;
    font-size: 17px;
    line-height: 1.8;
}

/* 🔆 Highlight */
.highlight {
    color: #f5d27a;
    font-weight: bold;
}

/* 📱 Mobile */
@media (max-width: 600px) {
    body {
        padding-bottom: 10vh;
    }

    .box {
        width: 94%;
        padding: 70px 20px;
    }

    .quote {
        font-size: 22px;
    }

    .text {
        font-size: 15px;
    }
}
</style>
</head>

<body>

<div class="box">
    
    <div class="quote gold-gradient">
        “Endings are celebrations of journeys well lived.”
    </div>

    <div class="text">
        With great respect,<br>
        we invite you to the <span class="highlight">Farewell 2025–26</span>,<br>
        hosted by Grade XI,<br>
        in honor of the graduating Class XII.
    </div>

</div>

</body>
</html>
