<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farewell Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 0;
    background-color: #0b0b0b;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Cinzel', serif;
    overflow: hidden;
}

/* ⭐ STARS */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
        radial-gradient(2px 2px at 10% 20%, white, transparent),
        radial-gradient(2px 2px at 30% 70%, white, transparent),
        radial-gradient(2px 2px at 50% 40%, white, transparent),
        radial-gradient(2px 2px at 70% 90%, white, transparent),
        radial-gradient(2px 2px at 90% 10%, white, transparent),
        radial-gradient(1.5px 1.5px at 20% 90%, white, transparent),
        radial-gradient(1.5px 1.5px at 60% 20%, white, transparent),
        radial-gradient(1px 1px at 80% 50%, white, transparent);
    animation: twinkle 2.5s infinite alternate;
    z-index: -1;
}

@keyframes twinkle {
    from { opacity: 0.5; }
    to { opacity: 1; }
}

/* 📦 BIG FULL-FEEL BOX */
.box {
    border: 2px solid #d4af37;
    padding: 70px 30px;
    width: 92%;              /* almost full width */
    max-width: 700px;        /* controls desktop */
    margin: auto;            /* ensures centering */
    text-align: center;
    border-radius: 20px;
}

/* GOLD TEXT */
.gold-gradient {
    background: linear-gradient(135deg, #f5d27a, #d4af37, #b8962e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* BIGGER QUOTE */
.quote {
    font-size: 34px;
    margin-bottom: 30px;
}

/* BIGGER TEXT */
.text {
    color: #e6e0d4;
    font-size: 19px;
    line-height: 1.8;
}

/* HIGHLIGHT */
.highlight {
    color: #f5d27a;
    font-weight: bold;
}

/* 📱 MOBILE PERFECT FIT */
@media (max-width: 600px) {
    body {
        padding: 0 8px;   /* tiny side gap */
    }

    .box {
        width: 100%;      /* fills screen */
        padding: 60px 20px;
    }

    .quote {
        font-size: 26px;
    }

    .text {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="box">
    
    <div class="quote gold-gradient">
        “Endings are celebrations of journeys well lived.”
    </div>

    <div class="text">
        With great respect,<br>
        we invite you to the <span class="highlight">Farewell 2025–26</span>,<br>
        hosted by Grade XI,<br>
        in honor of the graduating Class XII.
    </div>

</div>

</body>
</html>
