<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farewell Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 20px;
    background-color: #0b0b0b;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Cinzel', serif;
    overflow: hidden;
}

/* STARS BACKGROUND (FULL PAGE) */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
        radial-gradient(2px 2px at 20% 30%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1.5px 1.5px at 70% 80%, rgba(255,255,255,0.6), transparent),
        radial-gradient(1.5px 1.5px at 40% 60%, rgba(255,255,255,0.7), transparent),
        radial-gradient(2px 2px at 90% 20%, rgba(255,255,255,0.8), transparent),
        radial-gradient(1px 1px at 10% 90%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1.5px 1.5px at 60% 10%, rgba(255,255,255,0.6), transparent);
    animation: twinkle 4s infinite alternate;
    z-index: -2;
}

/* Slight dark overlay for readability */
body::after {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(11,11,11,0.85);
    z-index: -1;
}

/* Twinkle */
@keyframes twinkle {
    from { opacity: 0.3; }
    to { opacity: 1; }
}

/* BOX (less rectangular, more neat) */
.box {
    border: 2px solid #d4af37;
    padding: 60px 50px;
    width: 75%;           /* reduced width */
    max-width: 600px;     /* tighter box */
    text-align: center;
    border-radius: 18px;
    backdrop-filter: blur(2px); /* subtle glass effect */
}

/* GOLD GRADIENT */
.gold-gradient {
    background: linear-gradient(135deg, #f5d27a, #d4af37, #b8962e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* QUOTE */
.quote {
    font-size: 32px;
    margin-bottom: 30px;
}

/* TEXT */
.text {
    color: #e6e0d4;
    font-size: 18px;
    line-height: 1.8;
}

/* HIGHLIGHT */
.highlight {
    color: #f5d27a;
    font-weight: bold;
}

/* MOBILE */
@media (max-width: 600px) {
    .box {
        width: 90%;
        padding: 40px 25px;
    }

    .quote {
        font-size: 24px;
    }

    .text {
        font-size: 15px;
    }
}
</style>
</head>

<body>

<div class="box">
    
    <div class="quote gold-gradient">
        “Endings are celebrations of journeys well lived.”
    </div>

    <div class="text">
        With great respect,<br>
        we invite you to the <span class="highlight">Farewell 2025–26</span>,<br>
        hosted by Grade XI,<br>
        in honor of the graduating Class XII.
    </div>

</div>

</body>
</html>
