<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farewell Invite</title>

<!-- Cinzel Font -->
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 20px; /* prevents edge touching on mobile */
    background-color: #0b0b0b;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Cinzel', serif;
}

/* BIGGER BOX */
.box {
    background-color: #0b0b0b;
    border: 2px solid #d4af37;
    padding: 70px 90px;
    width: 90%;
    max-width: 900px;
    text-align: center;
    border-radius: 16px;
}

/* GOLD GRADIENT */
.gold-gradient {
    background: linear-gradient(135deg, #f5d27a, #d4af37, #b8962e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* QUOTE */
.quote {
    font-size: 36px;
    margin-bottom: 35px;
}

/* MESSAGE */
.text {
    color: #e6e0d4;
    font-size: 20px;
    line-height: 1.8;
}

/* HIGHLIGHT */
.highlight {
    color: #f5d27a;
    font-weight: bold;
}

/* MOBILE OPTIMIZATION */
@media (max-width: 600px) {
    .box {
        padding: 40px 25px;
    }

    .quote {
        font-size: 26px;
    }

    .text {
        font-size: 16px;
    }
}
</style>
</head>

<body>

<div class="box">
    
    <div class="quote gold-gradient">
        “Endings are celebrations of journeys well lived.”
    </div>

    <div class="text">
        With great respect,<br>
        we invite you to the <span class="highlight">Farewell 2025–26</span>,<br>
        hosted by Grade XI,<br>
        in honor of the graduating Class XII.
    </div>

</div>

</body>
</html>
