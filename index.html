<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farewell Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    padding: 10px;
    background-color: #0b0b0b;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Cinzel', serif;
    overflow: hidden;
}

/* ⭐ MORE + DENSER STARS */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
        radial-gradient(2px 2px at 5% 10%, white, transparent),
        radial-gradient(2px 2px at 15% 80%, white, transparent),
        radial-gradient(1.5px 1.5px at 25% 30%, white, transparent),
        radial-gradient(2px 2px at 35% 60%, white, transparent),
        radial-gradient(1.5px 1.5px at 45% 20%, white, transparent),
        radial-gradient(2px 2px at 55% 75%, white, transparent),
        radial-gradient(1.5px 1.5px at 65% 40%, white, transparent),
        radial-gradient(2px 2px at 75% 10%, white, transparent),
        radial-gradient(1.5px 1.5px at 85% 70%, white, transparent),
        radial-gradient(2px 2px at 95% 50%, white, transparent),
        radial-gradient(1px 1px at 20% 95%, white, transparent),
        radial-gradient(1px 1px at 60% 90%, white, transparent);
    animation: twinkle 2.5s infinite alternate;
    z-index: -1;
}

/* ✨ Twinkle */
@keyframes twinkle {
    from { opacity: 0.5; }
    to { opacity: 1; }
}

/* 📦 BIGGER BOX */
.box {
    border: 2px solid #d4af37;
    padding: 70px 40px;
    width: 95%;
    max-width: 650px;  /* increased */
    text-align: center;
    border-radius: 20px;
}

/* GOLD GRADIENT */
.gold-gradient {
    background: linear-gradient(135deg, #f5d27a, #d4af37, #b8962e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* 🔠 BIGGER QUOTE */
.quote {
    font-size: 32px;
    margin-bottom: 30px;
}

/* 🔠 BIGGER TEXT */
.text {
    color: #e6e0d4;
    font-size: 18px;
    line-height: 1.8;
}

/* HIGHLIGHT */
.highlight {
    color: #f5d27a;
    font-weight: bold;
}

/* 📱 MOBILE OPTIMIZATION */
@media (max-width: 600px) {
    .box {
        padding: 50px 25px;
        max-width: 90%;
    }

    .quote {
        font-size: 24px;
    }

    .text {
        font-size: 15px;
    }
}
</style>
</head>

<body>

<div class="box">
    
    <div class="quote gold-gradient">
        “Endings are celebrations of journeys well lived.”
    </div>

    <div class="text">
        With great respect,<br>
        we invite you to the <span class="highlight">Farewell 2025–26</span>,<br>
        hosted by Grade XI,<br>
        in honor of the graduating Class XII.
    </div>

</div>

</body>
</html>
