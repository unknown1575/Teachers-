<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Farewell Invite</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    background-color: #0b0b0b;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center; /* PERFECT CENTER */
    font-family: 'Cinzel', serif;
    overflow: hidden;
}

/* ⭐ STARS (clear + visible) */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image:
        radial-gradient(2px 2px at 10% 20%, white, transparent),
        radial-gradient(2px 2px at 30% 70%, white, transparent),
        radial-gradient(2px 2px at 50% 40%, white, transparent),
        radial-gradient(2px 2px at 70% 90%, white, transparent),
        radial-gradient(2px 2px at 90% 10%, white, transparent),
        radial-gradient(1.5px 1.5px at 20% 90%, white, transparent),
        radial-gradient(1.5px 1.5px at 60% 20%, white, transparent),
        radial-gradient(1px 1px at 80% 50%, white, transparent);
    animation: twinkle 2.5s infinite alternate;
    z-index: -1;
}

@keyframes twinkle {
    from { opacity: 0.5; }
    to { opacity: 1; }
}

/* 📦 TALLER, NOT TOO WIDE */
.box {
    border: 2px solid #d4af37;
    width: 85%;              /* not too wide */
    max-width: 500px;        /* keeps shape neat */
    padding: 90px 30px;      /* MORE HEIGHT */
    text-align: center;
    border-radius: 22px;
}

/* GOLD TEXT */
.gold-gradient {
    background: linear-gradient(135deg, #f5d27a, #d4af37, #b8962e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* BIG QUOTE */
.quote {
    font-size: 30px;
    margin-bottom: 40px;
}

/* TEXT */
.text {
    color: #e6e0d4;
    font-size: 18px;
    line-height: 1.9;
}

/* HIGHLIGHT */
.highlight {
    color: #f5d27a;
    font-weight: bold;
}

/* 📱 MOBILE */
@media (max-width: 600px) {
    .box {
        width: 90%;
        padding: 80px 20px; /* still tall */
    }

    .quote {
        font-size: 24px;
    }

    .text {
        font-size: 15px;
    }
}
</style>
</head>

<body>

<div class="box">
    
    <div class="quote gold-gradient">
        “Endings are celebrations of journeys well lived.”
    </div>

    <div class="text">
        With great respect,<br>
        we invite you to the <span class="highlight">Farewell 2025–26</span>,<br>
        hosted by Grade XI,<br>
        in honor of the graduating Class XII.
    </div>

</div>

</body>
</html>
